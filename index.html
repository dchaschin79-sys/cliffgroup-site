<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cliff Group Software</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 40px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 40px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 10px;
    }

    .primary {
      background: #22c55e;
      color: black;
    }

    .secondary {
      background: #3b82f6;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cliff Group Software</h1>
    <p>Solutions for HVAC & Business Automation</p>

    <h2>Our Products</h2>

    <div class="card">
      <h3>SalesPro</h3>
      <p>Sales, inventory and order management system</p>
    </div>

    <div class="card">
      <h3>HVAC Pro</h3>
      <p>Dispatch system for HVAC companies</p>
    </div>

    <div class="card">
      <h3>Estimate Pro</h3>
      <p>Fast HVAC estimate creation</p>
    </div>

    <h2>Get Started</h2>

    <button class="primary">Request Demo</button>
    <button class="secondary">Start Free Trial</button>
  </div>
</body>
</html>
